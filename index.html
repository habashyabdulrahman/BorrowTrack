<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BorrowTrack</title>
    <link rel="shortcut icon" href="icon.png" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#00d4aa" />
    <link rel="apple-touch-icon" href="icon.png" />
  </head>
  <body>
    <div id="toast" class="toast"></div>

    <!-- Edit Base Modal -->
    <div class="modal-overlay" id="modal-base">
      <div class="modal">
        <div class="modal-title">تعديل المبلغ الأساسي</div>
        <div class="modal-sub" id="modal-base-sub">
          القيمة الجديدة ستُعدِّل الرصيد المتبقي بنفس الفرق
        </div>
        <input
          type="number"
          class="modal-input"
          id="modal-base-input"
          placeholder="0"
          min="0"
          inputmode="decimal" />
        <div class="modal-actions">
          <button class="modal-cancel" id="modal-base-cancel">إلغاء</button>
          <button class="modal-confirm" id="modal-base-confirm">
            حفظ التعديل
          </button>
        </div>
      </div>
    </div>

    <div class="app">
      <header class="header">
        <div class="header-brand">
          <div class="brand-icon">💸</div>
          <span class="brand-name">BorrowTrack</span>
        </div>
        <span class="header-date" id="header-date"></span>
      </header>

      <div class="currency-tabs" id="currency-tabs">
        <button class="tab active" data-currency="EGP">
          <span class="tab-code">EGP</span><span class="tab-name">جنيه</span>
        </button>
        <button class="tab" data-currency="USD">
          <span class="tab-code">USD</span><span class="tab-name">دولار</span>
        </button>
        <button class="tab" data-currency="EUR">
          <span class="tab-code">EUR</span><span class="tab-name">يورو</span>
        </button>
      </div>

      <div class="wallet-card" id="wallet-card">
        <div class="card-top">
          <div>
            <div class="card-label">المبلغ المتبقي</div>
            <div class="card-remaining" id="val-remaining">10,000</div>
          </div>
          <div class="card-currency-badge" id="card-badge">EGP</div>
        </div>
        <div class="card-divider"></div>
        <div class="card-stats">
          <div class="stat-item">
            <button
              class="edit-base-btn"
              id="btn-edit-base"
              title="تعديل الإجمالي">
              ✏️
            </button>
            <div class="stat-label">إجمالي المحفظة</div>
            <div class="stat-value total" id="val-total">10,000</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">إجمالي المسحوب</div>
            <div class="stat-value spent" id="val-spent">0</div>
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-info">
            <span>نسبة المتبقي</span>
            <span id="progress-pct">100%</span>
          </div>
          <div class="progress-bar-bg">
            <div
              class="progress-bar-fill"
              id="progress-fill"
              style="width: 100%"></div>
          </div>
        </div>
      </div>

      <div class="action-console">
        <div class="amount-input-wrap">
          <input
            type="number"
            id="amount-input"
            placeholder="0.00"
            inputmode="decimal"
            min="0" />
          <span class="input-currency-label" id="input-currency-label"
            >EGP</span
          >
        </div>
        <div class="action-buttons">
          <button class="btn btn-withdraw" id="btn-withdraw">
            <span>↓</span> سحب
          </button>
          <button class="btn btn-deposit" id="btn-deposit">
            <span>↑</span> سداد
          </button>
        </div>
      </div>

      <!-- Exchange Rates -->
      <section>
        <div class="section-header">
          <span class="section-title">أسعار الصرف</span>
          <span style="font-size: 0.72rem; color: var(--text-secondary)"
            >قابل للتعديل</span
          >
        </div>
        <div class="rates-grid" id="rates-grid"></div>
      </section>

      <!-- History -->
      <section>
        <div class="section-header">
          <span class="section-title">أحدث الحركات</span>
          <span class="history-count" id="history-count">0 حركات</span>
        </div>
        <ul class="history-list" id="history-list"></ul>
      </section>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
